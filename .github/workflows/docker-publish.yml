name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Oder 'master' - je nachdem, wie dein Haupt-Branch heißt
    tags:
      - 'v*.*.*' # Trigger bei Version-Tags wie v1.0.0

env:
  REGISTRY: ghcr.io
  # Nutzt automatisch den Namen des Repositories in Kleinbuchstaben (wichtig für GHCR)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setzt die Docker-Metadaten auf (Tags wie 'latest' oder die Commit-SHA)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Meldet sich automatisiert bei GHCR an (nutzt den Repo-Token aus den Actions)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Richtet Buildx für optimierte Builds und Caching ein
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Baut das Image und pusht es in die GitHub Container Registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # Aktiviert automatischen Build-Cache auf GitHub, damit Folgebau-Vorgänge schneller sind
          cache-from: type=gha
          cache-to: type=gha,mode=max
